<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Healthy Space 2.0 - Full Menu</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        .menu-page-header {
            padding: 80px 0 20px;
            text-align: center;
        }

        .menu-container {
            max-width: 1000px;
            margin: 0 auto 6rem;
            padding: 0 20px;
        }

        .category {
            margin-bottom: 2.5rem;
        }

        .category h3 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            margin-bottom: 0.75rem;
            font-size: 1.6rem;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.75rem 1.5rem;
        }

        .menu-item {
            background: var(--bg-white);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            box-shadow: 0 6px 18px var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item .name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .menu-item .price {
            color: var(--primary-color);
            font-weight: 700;
        }

        .top-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .search-input {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            width: 100%;
            max-width: 360px;
        }

        @media (max-width:600px){
            .top-links{flex-direction:column;align-items:flex-start}
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;color:inherit">
                        <img src="logo2.jpg" alt="logo" class="logo-img">
                        <div class="logo-text">
                            <h1 style="font-size:1.1rem;margin:0">The Healthy Space 2.0</h1>
                            <h6 class="logo-sub" style="font-size:.7rem;margin:0">by Ajay & Vishwajeet</h6>
                        </div>
                    </a>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="menu.html" class="nav-link">Menu</a></li>
                    <li><a href="index.html#order" class="nav-link">Order Now</a></li>
                    <li><a href="index.html#contact" class="nav-link">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="menu-page-header">
        <div class="container">
            <h2 class="section-title">Full Menu</h2>
            <div class="title-underline"></div>
            <p class="section-subtitle">Browse all categories and prices. Use search to filter items.</p>
        </div>
    </header>

    <main class="menu-container">
        <div class="top-links">
            <div style="flex:1">
                <input id="menu-search" class="search-input" placeholder="Search menu items (e.g., Hakka Noodles)">
            </div>
            <div>
                <a href="index.html" class="btn btn-secondary">Back to Home</a>
            </div>
        </div>

        <div id="menu-list"></div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 The Healthy Space 2.0. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="menuData.js"></script>
    <script>
        function formatCategory(key) {
            // insert space before capital letters, replace camelCase and camel with space
            const spaced = key.replace(/([A-Z])/g, ' $1').replace(/_/g, ' ');
            return spaced.split(' ').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
        }

        function renderMenu(filter = '') {
            const container = document.getElementById('menu-list');
            container.innerHTML = '';
            const query = filter.trim().toLowerCase();

            Object.keys(menuData).forEach(category => {
                // filter items within category
                const items = menuData[category].filter(i => i.name.toLowerCase().includes(query));
                if (items.length === 0) return; // skip empty

                const catDiv = document.createElement('div');
                catDiv.className = 'category';

                const h3 = document.createElement('h3');
                h3.textContent = formatCategory(category);
                catDiv.appendChild(h3);

                const grid = document.createElement('div');
                grid.className = 'items-grid';

                items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'menu-item';

                    const name = document.createElement('div');
                    name.className = 'name';
                    name.textContent = item.name;

                    const price = document.createElement('div');
                    price.className = 'price';
                    price.textContent = '₹' + item.price;

                    itemDiv.appendChild(name);
                    itemDiv.appendChild(price);
                    grid.appendChild(itemDiv);
                });

                catDiv.appendChild(grid);
                container.appendChild(catDiv);
            });

            // If nothing matched, show message
            if (!container.hasChildNodes()) {
                container.innerHTML = '<p>No items found.</p>';
            }
        }

        // initial render
        document.addEventListener('DOMContentLoaded', function () {
            renderMenu();
            const search = document.getElementById('menu-search');
            search.addEventListener('input', function (e) {
                renderMenu(e.target.value);
            });
        });
    </script>
</body>

</html>
